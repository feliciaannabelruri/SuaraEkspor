version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: suaraekspor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: suaraekspor
      POSTGRES_PASSWORD: suaraekspor123
      POSTGRES_DB: suaraekspor
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: